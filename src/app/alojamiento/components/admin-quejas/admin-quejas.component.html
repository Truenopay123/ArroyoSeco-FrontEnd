<section class="admin-resenas">
	<div class="header">
		<h2>Moderación de Reseñas</h2>
		<div class="actions">
			<select [(ngModel)]="filtroEstado" (change)="cargar()">
				<option value="">Todas</option>
				<option value="Pendiente">Pendientes</option>
				<option value="Aprobada">Aprobadas</option>
				<option value="Rechazada">Rechazadas</option>
			</select>
			<button type="button" (click)="cargar()">Actualizar</button>
		</div>
	</div>

	<p *ngIf="loading">Cargando reseñas...</p>
	<p *ngIf="!loading && resenas.length === 0">No hay reseñas para mostrar.</p>

	<div class="resena" *ngFor="let r of resenas">
		<div class="top">
			<strong>{{ r.alojamientoNombre || 'Alojamiento' }}</strong>
			<span>{{ r.estado }}</span>
		</div>
		<p><strong>Calificación:</strong> {{ r.calificacion }} / 5</p>
		<p><strong>Comentario:</strong> {{ r.comentario }}</p>
		<p><small>{{ r.fechaCreacion | date:'dd/MM/yyyy HH:mm' }}</small></p>
		<div class="buttons">
			<button type="button" (click)="moderar(r.id, 'Aprobada')">Aprobar</button>
			<button type="button" (click)="moderar(r.id, 'Rechazada')">Rechazar</button>
			<button type="button" (click)="eliminar(r.id)">Eliminar</button>
		</div>
	</div>
</section>
