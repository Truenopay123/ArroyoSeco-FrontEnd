<section class="login">
  <div class="visual">
    <video class="visual-video" autoplay muted loop playsinline preload="auto">
      <source src="assets/images/Adjuntas.mp4" type="video/mp4" />
    </video>
    <div class="visual-overlay"></div>
    <div class="visual-text">
      <span class="visual-badge">Portal de Clientes</span>
      <h1>Arroyo Seco</h1>
      <p>"El tesoro escondido de Querétaro"</p>
      <div class="visual-features">
        <div class="visual-feature">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          <span>Alojamientos exclusivos</span>
        </div>
        <div class="visual-feature">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M14 6l-3.75 5 2.85 3.8-1.6 1.2C9.81 13.75 7 10 7 10l-6 8h22L14 6z"/></svg>
          <span>Paisajes únicos</span>
        </div>
      </div>
    </div>
  </div>

  <div class="form-panel">
    <div class="form-panel__content">
      <div class="form-card">
        <div class="logo">
          <img src="assets/images/logo-arroyo-seco.svg" alt="Arroyo Seco" />
        </div>

        <h2>Inicio de Sesión</h2>
        <p class="subtitle">Portal de Clientes</p>

        <form #f="ngForm" (ngSubmit)="submit(f)">
          <label>
            Correo Electrónico
            <input type="email" name="email" [(ngModel)]="model.email" placeholder="Ejemplo: correo&#64;gmail.com" required />
          </label>

          <label>
            Contraseña
            <input type="password" name="password" [(ngModel)]="model.password" placeholder="Contraseña" required />
          </label>

          <button type="submit" [disabled]="f.invalid || loading">
            Iniciar sesión
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10 17l5-5-5-5v10zm9-14H5a2 2 0 0 0-2 2v4h2V5h14v14H5v-4H3v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z" />
            </svg>
          </button>
        </form>

        <div class="links">
          <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
          <a routerLink="/login">Cambiar de rol</a>
          <a routerLink="/cliente/registrar">Crear cuenta</a>
        </div>
      </div>
    </div>
  </div>
</section>
