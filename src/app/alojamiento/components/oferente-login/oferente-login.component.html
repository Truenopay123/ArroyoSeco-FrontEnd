<section class="login">
  <div class="visual">
    <video class="visual-video" autoplay muted loop playsinline preload="auto">
      <source src="assets/images/Adjuntas.mp4" type="video/mp4" />
    </video>
    <div class="visual-overlay"></div>
    <div class="visual-text">
      <span class="visual-badge">Portal de Oferentes</span>
      <h1>Arroyo Seco</h1>
      <p>"El tesoro escondido de Querétaro"</p>
      <div class="visual-features">
        <div class="visual-feature">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          <span>Gestiona tu negocio</span>
        </div>
        <div class="visual-feature">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
          <span>Reservas en línea</span>
        </div>
      </div>
    </div>
  </div>

  <div class="form-panel">
    <div class="form-panel__content">
      <div class="form-card">
        <div class="logo">
          <img src="assets/images/logo-arroyo-seco.svg" alt="Arroyo Seco" />
        </div>

        <h2>Inicio de Sesión</h2>
        <p class="subtitle">Portal de Oferentes</p>

        <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">
          <label>
            Correo Electrónico
            <input
              type="email"
              name="email"
              placeholder="Ejemplo: correo&#64;gmail.com"
              [(ngModel)]="loginModel.email"
              required
            />
          </label>

          <label>
            Contraseña
            <input
              type="password"
              name="password"
              placeholder="Contraseña"
              [(ngModel)]="loginModel.password"
              required
            />
          </label>

          <button type="submit" [disabled]="loginForm.invalid">
            Iniciar sesión
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10 17l5-5-5-5v10zm9-14H5a2 2 0 0 0-2 2v4h2V5h14v14H5v-4H3v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z" />
            </svg>
          </button>
        </form>

        <div class="links">
          <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
          <a routerLink="/login">Cambiar de rol</a>
          <a routerLink="/oferente/solicitud">¿No estás registrado? Envía tu solicitud</a>
        </div>
      </div>
    </div>
  </div>
</section>
