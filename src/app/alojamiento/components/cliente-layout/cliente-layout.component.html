<app-cliente-navbar></app-cliente-navbar>

<header class="hero" *ngIf="heroTitle">
  <div class="hero-decor hero-decor--left"></div>
  <div class="hero-decor hero-decor--right"></div>
  <div class="hero-inner">
    <div class="hero-copy">
      <span class="hero-kicker">Arroyo Seco, Querétaro</span>
      <div class="hero-text">
        <h1>{{ heroTitle }}</h1>
        <p *ngIf="heroSubtitle">{{ heroSubtitle }}</p>
      </div>
    </div>

    <div class="hero-visual" *ngIf="heroImage">
      <div class="hero-visual-frame"></div>
      <img [src]="heroImage" [alt]="heroTitle" />
      <div class="hero-badge hero-badge--top">Rutas, descanso y aventura</div>
      <div class="hero-badge hero-badge--bottom">Tu siguiente plan empieza aquí</div>
    </div>
  </div>
</header>

<main class="content with-bottom-nav">
  <router-outlet></router-outlet>
</main>

<app-mobile-bottom-nav></app-mobile-bottom-nav>
<app-cliente-footer></app-cliente-footer>
