<section class="register-unified">
  <!-- Left: Visual Panel -->
  <div class="visual">
    <div class="visual-overlay"></div>
    <div class="visual-content">
      <img src="assets/images/logo-arroyo-seco.svg" alt="Arroyo Seco" class="logo" />
      <h1>Arroyo Seco</h1>
      <p class="tagline">"El tesoro escondido de Querétaro"</p>
      <div class="features">
        <div class="feature">
          <svg class="feature-icon" viewBox="0 0 24 24"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          <span>Crea tu cuenta gratis</span>
        </div>
        <div class="feature">
          <svg class="feature-icon" viewBox="0 0 24 24"><path d="M7 14.5h10v-1H7v1zM7 11h10v-1H7v1zM19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/></svg>
          <span>Reserva alojamientos</span>
        </div>
        <div class="feature">
          <svg class="feature-icon" viewBox="0 0 24 24"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/></svg>
          <span>Disfruta la gastronomía</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Right: Register Form -->
  <div class="form-panel">
    <div class="form-wrapper">
      <div class="form-card">
        <div class="form-header">
          <h2>Crear cuenta</h2>
          <p class="form-subtitle">Regístrate para vivir la experiencia Arroyo Seco</p>
        </div>

        <form #f="ngForm" (ngSubmit)="submit(f)" class="register-form">
          <div class="input-group">
            <label for="email">Correo Electrónico</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24">
                <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
              </svg>
              <input
                id="email"
                type="email"
                name="email"
                [(ngModel)]="model.email"
                placeholder="tu&#64;correo.com"
                required
                pattern="^[^\s@]+@[^\s@]+\.[^\s@]{2,}$"
                autocomplete="email"
                #email="ngModel"
              />
            </div>
            <small class="field-error" *ngIf="email.invalid && (email.dirty || email.touched)">Ingresa un correo válido</small>
          </div>

          <div class="input-group">
            <label for="password">Contraseña</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/>
              </svg>
              <input
                id="password"
                [type]="showPassword ? 'text' : 'password'"
                name="password"
                [(ngModel)]="model.password"
                placeholder="Mínimo 6 caracteres"
                required
                minlength="6"
                autocomplete="new-password"
                #pwd="ngModel"
              />
              <button type="button" class="toggle-pass" (click)="showPassword = !showPassword" tabindex="-1">
                <svg *ngIf="!showPassword" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                <svg *ngIf="showPassword" viewBox="0 0 24 24"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>
              </button>
            </div>
            <small class="field-error" *ngIf="pwd.invalid && (pwd.dirty || pwd.touched)">Mínimo 6 caracteres</small>
          </div>

          <div class="input-group">
            <label for="confirm">Confirmar Contraseña</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>
              </svg>
              <input
                id="confirm"
                [type]="showConfirm ? 'text' : 'password'"
                name="confirm"
                [(ngModel)]="model.confirm"
                placeholder="Repite tu contraseña"
                required
                autocomplete="new-password"
                #conf="ngModel"
              />
              <button type="button" class="toggle-pass" (click)="showConfirm = !showConfirm" tabindex="-1">
                <svg *ngIf="!showConfirm" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                <svg *ngIf="showConfirm" viewBox="0 0 24 24"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>
              </button>
            </div>
            <small class="field-error" *ngIf="model.confirm && model.password !== model.confirm">Las contraseñas no coinciden</small>
          </div>

          <button type="submit" class="btn-submit" [disabled]="f.invalid || loading || (model.password !== model.confirm)">
            <span *ngIf="!loading">Crear mi cuenta</span>
            <span *ngIf="loading" class="spinner"></span>
          </button>
        </form>

        <div class="divider">
          <span>o</span>
        </div>

        <div class="secondary-actions">
          <p class="register-text">
            ¿Ya tienes cuenta?
            <a routerLink="/cliente/login" class="link-accent">Iniciar sesión</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
