<header class="oferente-navbar">
  <div class="navbar-inner">
    <a class="brand" routerLink="/oferente/dashboard">
      <img src="assets/images/logo-arroyo-seco.svg" alt="Arroyo Seco" class="brand__logo" />
    </a>

    <button class="hamburger" [class.open]="menuOpen" (click)="toggleMenu()" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>

    <div class="nav-drawer" [class.open]="menuOpen">
      <button class="close-btn" (click)="toggleMenu()" aria-label="Cerrar menú">
        <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/></svg>
      </button>
      <nav class="drawer-links">
        <a
          *ngFor="let link of links"
          [routerLink]="link.route"
          routerLinkActive="active"
          class="nav-link"
          [routerLinkActiveOptions]="{ exact: false }"
        >
          {{ link.label }}
        </a>
      </nav>
      <div class="drawer-actions">
        <a class="cambiar-experiencia" routerLink="/oferente/home" title="Cambiar de módulo">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
          Cambiar Experiencia
        </a>
        <a class="logout" (click)="logout()">Cerrar Sesión</a>
      </div>
    </div>
  </div>
</header>
