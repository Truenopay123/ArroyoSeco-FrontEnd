<section class="auth-wrapper">
  <form #f="ngForm" (ngSubmit)="submit(f)" class="card" *ngIf="!done">
    <h2>Recuperar contraseña</h2>
    <p>Ingresa tu correo para recibir un enlace de restablecimiento.</p>
    <input type="email" name="email" [(ngModel)]="email" placeholder="tu@correo.com" required />
    <button [disabled]="f.invalid || loading">{{ loading ? 'Enviando...' : 'Enviar enlace' }}</button>
    <a routerLink="/login">Volver a login</a>
  </form>

  <div class="card" *ngIf="done">
    <h2>Revisa tu correo</h2>
    <p>Si el correo existe, enviamos un enlace para restablecer la contraseña.</p>
    <a routerLink="/login">Volver a login</a>
  </div>
</section>
