<section class="auth-wrapper">
  <div class="auth-visual">
    <video class="auth-video" autoplay muted loop playsinline preload="auto">
      <source src="assets/images/Adjuntas.mp4" type="video/mp4" />
    </video>
    <div class="auth-overlay"></div>
    <div class="auth-brand">
      <h1>Arroyo Seco</h1>
      <p>"El tesoro escondido de Quer&eacute;taro"</p>
    </div>
  </div>

  <div class="auth-form-panel">
    <div class="auth-card" *ngIf="!done">
      <div class="auth-logo">
        <img src="assets/images/logo-arroyo-seco.svg" alt="Arroyo Seco" />
      </div>
      <h2>Recuperar contrase&ntilde;a</h2>
      <p class="auth-subtitle">Ingresa tu correo para recibir un enlace de restablecimiento.</p>
      <form #f="ngForm" (ngSubmit)="submit(f)">
        <label>
          Correo Electr&oacute;nico
          <input type="email" name="email" [(ngModel)]="email" placeholder="tu@correo.com" required />
        </label>
        <button [disabled]="f.invalid || loading">{{ loading ? 'Enviando...' : 'Enviar enlace' }}</button>
      </form>
      <a routerLink="/login" class="auth-link">Volver a login</a>
    </div>

    <div class="auth-card" *ngIf="done">
      <div class="auth-logo">
        <img src="assets/images/logo-arroyo-seco.svg" alt="Arroyo Seco" />
      </div>
      <h2>Revisa tu correo</h2>
      <p class="auth-subtitle">Si el correo existe, enviamos un enlace para restablecer la contrase&ntilde;a.</p>
      <a routerLink="/login" class="auth-link">Volver a login</a>
    </div>
  </div>
</section>
