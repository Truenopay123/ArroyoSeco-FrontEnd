<section class="auth-wrapper">
  <form #f="ngForm" (ngSubmit)="submit(f)" class="card" *ngIf="!done">
    <h2>Nueva contraseña</h2>
    <p *ngIf="error" class="error">{{ error }}</p>

    <input type="password" name="passwordNueva" [(ngModel)]="passwordNueva" placeholder="Nueva contraseña" required minlength="6" />
    <input type="password" name="confirm" [(ngModel)]="confirm" placeholder="Confirmar contraseña" required minlength="6" />

    <button [disabled]="f.invalid || loading || !!error">{{ loading ? 'Guardando...' : 'Restablecer contraseña' }}</button>
    <a routerLink="/login">Volver a login</a>
  </form>

  <div class="card" *ngIf="done">
    <h2>Contraseña actualizada</h2>
    <p>Ya puedes iniciar sesión con tu nueva contraseña.</p>
    <a routerLink="/login">Ir a login</a>
  </div>
</section>
