<section class="auth-wrapper">
  <!-- VISUAL PANEL -->
  <div class="auth-visual">
    <video class="auth-video" autoplay muted loop playsinline>
      <source src="assets/images/Iglesia.mp4" type="video/mp4" />
    </video>
    <div class="auth-overlay"></div>
    <div class="auth-brand">
      <h1>Arroyo Seco</h1>
      <p>Restablecer acceso seguro</p>
    </div>
  </div>

  <!-- FORM PANEL -->
  <div class="auth-form-panel">
    <div class="auth-card" *ngIf="!done">
      <div class="auth-logo">
        <img src="assets/images/logo.png" alt="Logo Arroyo Seco" />
      </div>
      <h2>Nueva Contrase&ntilde;a</h2>
      <p class="auth-subtitle">Ingres&aacute; tu nueva contrase&ntilde;a para restablecer tu acceso.</p>

      <p *ngIf="error" class="error">{{ error }}</p>

      <form #f="ngForm" (ngSubmit)="submit(f)">
        <label>
          Contrase&ntilde;a nueva
          <input type="password" name="passwordNueva" [(ngModel)]="passwordNueva"
                 placeholder="M&iacute;nimo 6 caracteres" required minlength="6" />
        </label>
        <label>
          Confirmar contrase&ntilde;a
          <input type="password" name="confirm" [(ngModel)]="confirm"
                 placeholder="Repet&iacute; tu contrase&ntilde;a" required minlength="6" />
        </label>
        <button [disabled]="f.invalid || loading || !!error">
          {{ loading ? 'Guardando...' : 'Restablecer Contrase&ntilde;a' }}
        </button>
      </form>

      <a routerLink="/login" class="auth-link">Volver a login</a>
    </div>

    <div class="auth-card" *ngIf="done">
      <div class="auth-logo">
        <img src="assets/images/logo.png" alt="Logo Arroyo Seco" />
      </div>
      <h2>Contrase&ntilde;a Actualizada</h2>
      <p class="auth-subtitle">Ya pod&eacute;s iniciar sesi&oacute;n con tu nueva contrase&ntilde;a.</p>
      <a routerLink="/login" class="auth-link">Ir a login</a>
    </div>
  </div>
</section>
